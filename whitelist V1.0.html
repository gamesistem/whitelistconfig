<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitelist GameSistem</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
    background-color: #121212;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}
.container {
    background-color: #1e1e1e;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 650px;
}
h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #ffffff;
    font-size: 1.8rem;
}
.form-group {
    margin-bottom: 15px;
}
label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 0.95rem;
    color: #b3b3b3;
}
input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 2px solid #333;
    background-color: #2a2a2a;
    color: #ffffff;
    font-size: 1rem;
    transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
    outline: none;
}
textarea {
    resize: vertical;
    min-height: 100px;
}
textarea.large {
    min-height: 180px;
}
input:focus, textarea:focus {
    border-color: #bb86fc;
    background-color: #333333;
    box-shadow: 0 0 8px rgba(187, 134, 252, 0.4);
}
input.error, textarea.error {
    border-color: #cf6679;
    box-shadow: 0 0 8px rgba(207, 102, 121, 0.4);
}
button {
    width: 100%;
    padding: 16px;
    background-color: #bb86fc;
    color: #121212;
    border: none;
    border-radius: 8px;
    font-size: 1.15rem;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
    margin-top: 15px;
}
button:hover {
    background-color: #9d4edd;
    box-shadow: 0 4px 12px rgba(157, 78, 221, 0.5);
}
button:active {
    transform: scale(0.97);
}
#successMessage {
    display: none;
    background-color: #03dac6;
    color: #000000;
    padding: 15px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 20px;
    font-weight: bold;
    font-size: 1.05rem;
    animation: fadeIn 0.5s ease forwards;
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
@media (max-width: 600px) {
    .container {
        padding: 20px;
    }
    h1 {
        font-size: 1.5rem;
    }
    input, textarea, button {
        font-size: 0.95rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <div id="successMessage">Arquivo gerado e download iniciado com sucesso!</div>
    <h1>Formulário de Whitelist</h1>
    
    <form id="whitelistForm">
        <div class="form-group">
            <label for="nomeRP">Nome de RP</label>
            <input type="text" id="nomeRP" name="Nome de RP">
        </div>
        
        <div class="form-group">
            <label for="idadeRP">Idade de RP</label>
            <input type="number" id="idadeRP" name="Idade de RP">
        </div>
        
        <div class="form-group">
            <label for="loreRP">Lore de RP</label>
            <textarea id="loreRP" class="large" name="Lore de RP"></textarea>
        </div>
        
        <div class="form-group">
            <label for="oqueRolePlay">O que é RolePlay</label>
            <textarea id="oqueRolePlay" name="O que é RolePlay"></textarea>
        </div>
        
        <div class="form-group">
            <label for="oqueAntiRP">O que é AntiRP</label>
            <textarea id="oqueAntiRP" name="O que é AntiRP"></textarea>
        </div>
        
        <div class="form-group">
            <label for="oqueMetagaming">O que é Metagaming</label>
            <textarea id="oqueMetagaming" name="O que é Metagaming"></textarea>
        </div>
        
        <div class="form-group">
            <label for="oquePowergaming">O que é Powergaming</label>
            <textarea id="oquePowergaming" name="O que é Powergaming"></textarea>
        </div>
        
        <div class="form-group">
            <label for="porqueRuins">Por que metagaming e powergaming são ruins</label>
            <textarea id="porqueRuins" name="Por que metagaming e powergaming são ruins"></textarea>
        </div>
        
        <div class="form-group">
            <label for="contaDiscord">Conta do Discord (@usuario)</label>
            <input type="text" id="contaDiscord" name="Conta do Discord">
        </div>
        
        <button type="submit">Enviar / Gerar Whitelist</button>
    </form>
</div>

<script>
document.getElementById('whitelistForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    let isFormValid = true;
    const formFields =[
        'nomeRP', 
        'idadeRP', 
        'loreRP', 
        'oqueRolePlay', 
        'oqueAntiRP', 
        'oqueMetagaming', 
        'oquePowergaming', 
        'porqueRuins', 
        'contaDiscord'
    ];
    
    const whitelistData = {};
    
    formFields.forEach(function(fieldId) {
        const element = document.getElementById(fieldId);
        const value = element.value.trim();
        element.classList.remove('error');
        
        if (value === '') {
            element.classList.add('error');
            isFormValid = false;
        } else {
            whitelistData[element.getAttribute('name')] = value;
        }
    });
    
    const discordElement = document.getElementById('contaDiscord');
    const discordValue = discordElement.value.trim();
    if (discordValue !== '' && !discordValue.startsWith('@')) {
        discordElement.classList.add('error');
        isFormValid = false;
    }
    
    if (!isFormValid) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
    }
    
    const jsonString = JSON.stringify(whitelistData, null, 4);
    const blob = new Blob([jsonString], { type: 'application/octet-stream' });
    const fileUrl = URL.createObjectURL(blob);
    
    const baseName = whitelistData['Nome de RP'].replace(/\s+/g, '_');
    const fileName = `whitelist_${baseName}.whitelist`;
    
    const downloadLink = document.createElement('a');
    downloadLink.href = fileUrl;
    downloadLink.download = fileName;
    downloadLink.style.display = 'none';
    
    document.body.appendChild(downloadLink);
    downloadLink.click();
    
    setTimeout(function() {
        document.body.removeChild(downloadLink);
        URL.revokeObjectURL(fileUrl);
    }, 200);
    
    const successBox = document.getElementById('successMessage');
    successBox.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    setTimeout(function() {
        successBox.style.display = 'none';
    }, 6000);
    
    document.getElementById('whitelistForm').reset();
});
</script>

</body>
</html>
