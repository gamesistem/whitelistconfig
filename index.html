<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameSistem | Mainl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #fce205;
            --pink: #ff003c;
            --cyan: #00f0ff;
            --dark: #050505;
            --darker: #020202;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--dark);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Container & Glitch Title */
        .glitch-wrapper {
            position: relative;
            text-align: center;
            margin-bottom: 3rem;
            z-index: 10;
        }

        .glitch-title {
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            color: var(--text-main);
            text-shadow: 0.05em 0 0 var(--pink), -0.025em -0.05em 0 var(--cyan),
                         0.025em 0.05em 0 var(--yellow);
            animation: glitch-skew 1.5s infinite linear alternate-reverse;
        }

        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch-title::before {
            left: 2px;
            text-shadow: -1px 0 var(--pink);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .glitch-title::after {
            left: -2px;
            text-shadow: -1px 0 var(--cyan);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        .subtitle {
            color: var(--cyan);
            letter-spacing: 0.5em;
            font-size: 1rem;
            text-transform: uppercase;
            margin-top: -10px;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        /* Punk / Cyber Buttons */
        .cybr-btn {
            --primary: var(--yellow);
            --shadow-primary: var(--cyan);
            --color: var(--dark);
            --hover: var(--pink);
            --font-size: 1.2rem;
            --label-size: 0.6rem;
            --gap: 0.5rem;
            --clip: polygon(0 0, 100% 0, 100% 100%, 8% 100%, 0 70%);
            
            font-family: 'Share Tech Mono', monospace;
            color: var(--color);
            background: var(--primary);
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            font-size: var(--font-size);
            font-weight: bold;
            letter-spacing: 2px;
            position: relative;
            padding: 1.5rem 3rem;
            min-width: 350px;
            clip-path: var(--clip);
            transition: all 0.2s ease-in-out;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .cybr-btn.mod-edition {
            --primary: var(--pink);
            --shadow-primary: var(--yellow);
            --color: white;
            --hover: var(--cyan);
        }

        .cybr-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--shadow-primary);
            clip-path: var(--clip);
            z-index: -1;
            transform: translate(5px, 5px);
            transition: transform 0.2s ease-in-out;
        }

        .cybr-btn:hover {
            background: var(--hover);
            color: var(--text-main);
        }

        .cybr-btn:hover::before {
            transform: translate(0, 0);
        }

        .cybr-btn__tag {
            position: absolute;
            bottom: 0;
            right: 5%;
            font-size: var(--label-size);
            padding: 2px 5px;
            background: var(--darker);
            color: var(--primary);
            letter-spacing: 1px;
            z-index: 2;
        }

        .cybr-btn:hover .cybr-btn__tag {
            color: var(--hover);
        }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #39ff14;
            font-weight: bold;
        }

        /* Screen Overlay for transition */
        .boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            color: var(--cyan);
            font-size: 1.2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .boot-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Keyframes */
        @keyframes blinker {
            50% { opacity: 0; }
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 83px, 0); }
            20% { clip: rect(69px, 9999px, 14px, 0); }
            40% { clip: rect(32px, 9999px, 92px, 0); }
            60% { clip: rect(98px, 9999px, 4px, 0); }
            80% { clip: rect(41px, 9999px, 66px, 0); }
            100% { clip: rect(2px, 9999px, 51px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(12px, 9999px, 54px, 0); }
            40% { clip: rect(89px, 9999px, 23px, 0); }
            60% { clip: rect(44px, 9999px, 78px, 0); }
            80% { clip: rect(8px, 9999px, 11px, 0); }
            100% { clip: rect(55px, 9999px, 90px, 0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-5deg); }
            40% { transform: skew(4deg); }
            60% { transform: skew(-2deg); }
            80% { transform: skew(3deg); }
            100% { transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <div class="relative z-10 w-full max-w-4xl mx-auto flex flex-col items-center p-6">
        
        <!-- HEADER -->
        <div class="glitch-wrapper">
            <h1 class="glitch-title" data-text="GameSistem">GameSistem</h1>
            <div class="subtitle">Lobby</div>
        </div>

        <!-- MENU OPTIONS -->
        <div class="flex flex-col gap-4 w-full items-center mt-8">
            
            <!-- COLOQUE SEU LINK DO USER AQUI, substituindo o 'LINK_PAGINA_USER_AQUI.html' -->
            <button class="cybr-btn" onmouseover="playHoverSound()" onclick="accessSystem('Whitelist User Version', 'usr_auth_protocol', 'https://gamesistem.github.io/whitelistconfig/whitelist%20V1.0.html')">
                <span>[01] USER WHITELIST</span>
                <span aria-hidden>_</span>
                <span class="cybr-btn__tag">SYS_01</span>
            </button>

            <!-- COLOQUE SEU LINK DO MOD AQUI, substituindo o 'LINK_PAGINA_MOD_AQUI.html' -->
            <button class="cybr-btn mod-edition" onmouseover="playHoverSound()" onclick="accessSystem('Whitelist Mod Edition', 'mod_override_protocol', 'https://gamesistem.github.io/whitelistconfig/moderadorwl%20V1.0.html')">
                <span>[02] MOD EDITION</span>
                <span aria-hidden>_</span>
                <span class="cybr-btn__tag">OVR_02</span>
            </button>

        </div>

    </div>

    <!-- FOOTER STATUS -->
    <div class="status-bar">
        > SYSTEM_CORE: <span class="blink">ONLINE</span><br>
        > SECURITY: BYPASSED<br>
        > WAITING FOR INPUT...
    </div>

    <!-- FAKE BOOT SCREEN -->
    <div class="boot-screen" id="bootScreen">
        <div id="bootText"></div>
    </div>

    <script>
        // Setup Audio Context for Synthetic Punk Beeps
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playHoverSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Low gritty buzz
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function playClickSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch click
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        // System Access Simulation
        function accessSystem(targetName, protocol, targetUrl) {
            playClickSound();
            const bootScreen = document.getElementById('bootScreen');
            const bootText = document.getElementById('bootText');
            
            bootScreen.classList.add('active');
            bootText.innerHTML = '';

            const lines = [
                `> Executing ${protocol}.exe...`,
                `> Bypassing firewall constraints... [OK]`,
                `> Injecting payload... [OK]`,
                `> Decrypting access keys for: <span style="color:#ff003c">${targetName}</span>`,
                `> ACCESS GRANTED.`,
                `> Redirecting...`
            ];

            let delay = 0;
            lines.forEach((line, index) => {
                setTimeout(() => {
                    bootText.innerHTML += line + '<br>';
                    // Simulating random loading times per line
                }, delay);
                delay += Math.random() * 400 + 200; 
            });

            // Redireciona para o link fornecido após a simulação
            setTimeout(() => {
                if(targetUrl !== 'LINK_PAGINA_USER_AQUI.html' && targetUrl !== 'LINK_PAGINA_MOD_AQUI.html') {
                    window.location.href = targetUrl;
                } else {
                    // Se você ainda não trocou o link, ele apenas avisa e volta pro menu
                    bootText.innerHTML += '<br>> <span style="color:var(--yellow)">ERRO: LINK DE DESTINO NÃO CONFIGURADO NO HTML.</span><br>> Abortando...';
                    setTimeout(() => {
                        bootScreen.classList.remove('active');
                        bootText.innerHTML = '';
                    }, 2500);
                }
            }, delay + 1000);
        }

        // Initialize audio on first user interaction anywhere
        document.body.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
