<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitelist GameSistem V2.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

:root {
    --bg:       #080c0f;
    --surface:  #0d1318;
    --border:   #1c2e22;
    --accent:   #00ff88;
    --accent2:  #00c8ff;
    --danger:   #ff2d6b;
    --text:     #b8d4c0;
    --muted:    #4a6657;
    --glow:     rgba(0,255,136,0.18);
    --glow2:    rgba(0,200,255,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg);
    background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,200,255,0.012) 40px, rgba(0,200,255,0.012) 41px);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
}

/* ── corner bracket decoration ── */
.container {
    position: relative;
    background-color: var(--surface);
    padding: 42px 36px 36px;
    width: 100%;
    max-width: 680px;
    border: 1px solid var(--border);
    clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
}
.container::before,
.container::after {
    content: '';
    position: absolute;
    width: 32px; height: 32px;
    border-color: var(--accent);
    border-style: solid;
}
.container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.header {
    text-align: center;
    margin-bottom: 36px;
    position: relative;
}
.header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
}
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.7rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.08em;
    text-shadow: 0 0 24px var(--accent), 0 0 60px rgba(0,255,136,0.2);
    position: relative;
}
h1 span { color: var(--accent); }
.header-line {
    margin-top: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.5;
}

.form-group {
    margin-bottom: 18px;
    position: relative;
}
label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
}
label::before {
    content: '//';
    color: var(--accent);
    opacity: 0.6;
    font-size: 0.75rem;
}

input, textarea {
    width: 100%;
    padding: 13px 16px;
    background-color: rgba(0,0,0,0.45);
    border: 1px solid #1e3328;
    border-left: 2px solid var(--accent);
    color: #e8f5ee;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background-color 0.25s;
    caret-color: var(--accent);
}
textarea { resize: vertical; min-height: 100px; }
textarea.large { min-height: 180px; }

input:focus, textarea:focus {
    border-color: var(--accent);
    border-left-color: var(--accent);
    background-color: rgba(0,255,136,0.04);
    box-shadow: 0 0 0 1px rgba(0,255,136,0.15), inset 0 0 20px rgba(0,255,136,0.04);
}
input::placeholder, textarea::placeholder { color: #2a4536; }

input.error, textarea.error {
    border-color: var(--danger);
    border-left-color: var(--danger);
    box-shadow: 0 0 0 1px rgba(255,45,107,0.2), 0 0 16px rgba(255,45,107,0.1);
}

.btn-wrap { position: relative; margin-top: 24px; }
button {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    transition: background 0.25s, color 0.25s, box-shadow 0.25s;
    position: relative;
    overflow: hidden;
}
button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
}
button:hover {
    color: #000;
    box-shadow: 0 0 28px var(--glow), 0 0 60px var(--glow2);
}
button:hover::before { opacity: 1; }
button:hover .btn-label { position: relative; z-index: 1; color: #000; }
button:active { transform: scale(0.98); }
.btn-label { position: relative; z-index: 1; }

#successMessage {
    display: none;
    position: relative;
    background: rgba(0,255,136,0.06);
    border: 1px solid var(--accent);
    border-left: 3px solid var(--accent);
    color: var(--accent);
    padding: 14px 20px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: slideIn 0.4s ease forwards;
    box-shadow: 0 0 20px var(--glow);
}
#successMessage::before { content: '> '; color: var(--accent2); }

@keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #1c3326);
}
.divider::after { background: linear-gradient(90deg, #1c3326, transparent); }

@media (max-width: 600px) {
    .container { padding: 28px 20px; }
    h1 { font-size: 1.35rem; }
}
</style>
</head>
<body>

<div class="container">
    <div id="successMessage">arquivo gerado — download iniciado com sucesso</div>

    <div class="header">
        <div class="header-tag">acesso_restrito // protocolo_v2</div>
        <h1>WHITE<span>LIST</span></h1>
        <div class="header-line"></div>
    </div>

    <form id="whitelistForm">

        <div class="divider">identidade_rp</div>

        <div class="form-group">
            <label for="nomeRP">Nome de RP</label>
            <input type="text" id="nomeRP" name="Nome de RP" placeholder="ex: John Doe">
        </div>

        <div class="form-group">
            <label for="idadeRP">Idade de RP</label>
            <input type="number" id="idadeRP" name="Idade de RP" placeholder="ex: 28">
        </div>

        <div class="form-group">
            <label for="loreRP">Lore de RP</label>
            <textarea id="loreRP" class="large" name="Lore de RP" placeholder="descreva a história do seu personagem..."></textarea>
        </div>

        <div class="divider">conhecimento_técnico</div>

        <div class="form-group">
            <label for="oqueRolePlay">O que é RolePlay</label>
            <textarea id="oqueRolePlay" name="O que é RolePlay" placeholder="defina com suas palavras..."></textarea>
        </div>

        <div class="form-group">
            <label for="oqueAntiRP">O que é AntiRP</label>
            <textarea id="oqueAntiRP" name="O que é AntiRP" placeholder="defina com suas palavras..."></textarea>
        </div>

        <div class="form-group">
            <label for="oqueMetagaming">O que é Metagaming</label>
            <textarea id="oqueMetagaming" name="O que é Metagaming" placeholder="defina com suas palavras..."></textarea>
        </div>

        <div class="form-group">
            <label for="oquePowergaming">O que é Powergaming</label>
            <textarea id="oquePowergaming" name="O que é Powergaming" placeholder="defina com suas palavras..."></textarea>
        </div>

        <div class="form-group">
            <label for="porqueRuins">Por que metagaming e powergaming são ruins</label>
            <textarea id="porqueRuins" name="Por que metagaming e powergaming são ruins" placeholder="explique o impacto no servidor..."></textarea>
        </div>

        <div class="divider">contato</div>

        <div class="form-group">
            <label for="contaDiscord">Conta do Discord</label>
            <input type="text" id="contaDiscord" name="Conta do Discord" placeholder="@usuario">
        </div>

        <div class="btn-wrap">
            <button type="submit"><span class="btn-label">&#9654; Enviar / Gerar Whitelist</span></button>
        </div>

    </form>
</div>

<script>
document.getElementById('whitelistForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    let isFormValid = true;
    const formFields =[
        'nomeRP', 
        'idadeRP', 
        'loreRP', 
        'oqueRolePlay', 
        'oqueAntiRP', 
        'oqueMetagaming', 
        'oquePowergaming', 
        'porqueRuins', 
        'contaDiscord'
    ];
    
    const whitelistData = {};
    
    formFields.forEach(function(fieldId) {
        const element = document.getElementById(fieldId);
        const value = element.value.trim();
        element.classList.remove('error');
        
        if (value === '') {
            element.classList.add('error');
            isFormValid = false;
        } else {
            whitelistData[element.getAttribute('name')] = value;
        }
    });
    
    const discordElement = document.getElementById('contaDiscord');
    const discordValue = discordElement.value.trim();
    if (discordValue !== '' && !discordValue.startsWith('@')) {
        discordElement.classList.add('error');
        isFormValid = false;
    }
    
    if (!isFormValid) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
    }
    
    const jsonString = JSON.stringify(whitelistData, null, 4);
    const blob = new Blob([jsonString], { type: 'application/octet-stream' });
    const fileUrl = URL.createObjectURL(blob);
    
    const baseName = whitelistData['Nome de RP'].replace(/\s+/g, '_');
    const fileName = `whitelist_${baseName}.whitelist`;
    
    const downloadLink = document.createElement('a');
    downloadLink.href = fileUrl;
    downloadLink.download = fileName;
    downloadLink.style.display = 'none';
    
    document.body.appendChild(downloadLink);
    downloadLink.click();
    
    setTimeout(function() {
        document.body.removeChild(downloadLink);
        URL.revokeObjectURL(fileUrl);
    }, 200);
    
    const successBox = document.getElementById('successMessage');
    successBox.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    setTimeout(function() {
        successBox.style.display = 'none';
    }, 6000);
    
    document.getElementById('whitelistForm').reset();
});
    //GameSistem Oficial Cód
</script>
</body>
</html>
