<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderador WL</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
    background-color: #121212;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
}
.container {
    background-color: #1e1e1e;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 800px;
}
h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #bb86fc;
    font-size: 1.8rem;
}
.import-section {
    text-align: center;
    margin-bottom: 30px;
    padding: 30px 20px;
    border: 2px dashed #bb86fc;
    border-radius: 8px;
    background-color: #2a2a2a;
    transition: background-color 0.3s, border-color 0.3s;
}
.import-section.dragover {
    background-color: #382b47;
    border-color: #03dac6;
}
input[type="file"] {
    display: none;
}
.file-label {
    background-color: #bb86fc;
    color: #121212;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    display: inline-block;
    transition: background-color 0.3s;
    margin-top: 10px;
}
.file-label:hover {
    background-color: #9d4edd;
}
.field-card {
    background-color: #252525;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    border-left: 4px solid #333;
    transition: border-color 0.3s;
}
.field-title {
    font-size: 1.1rem;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 10px;
}
textarea {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #444;
    background-color: #1a1a1a;
    color: #b3b3b3;
    font-size: 1rem;
    resize: vertical;
    min-height: 80px;
    outline: none;
    margin-bottom: 15px;
    overflow: hidden;
}
.evaluation-buttons {
    display: flex;
    gap: 10px;
}
.btn-eval {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    color: #fff;
    opacity: 0.4;
    transition: all 0.2s ease;
}
.btn-eval:hover { opacity: 0.8; }
.btn-green { background-color: #4caf50; }
.btn-yellow { background-color: #ff9800; color: #121212;}
.btn-red { background-color: #f44336; }

.btn-green.active { opacity: 1; box-shadow: 0 0 12px rgba(76, 175, 80, 0.6); }
.btn-yellow.active { opacity: 1; box-shadow: 0 0 12px rgba(255, 152, 0, 0.6); }
.btn-red.active { opacity: 1; box-shadow: 0 0 12px rgba(244, 67, 54, 0.6); }

.field-card.green-border { border-left-color: #4caf50; }
.field-card.yellow-border { border-left-color: #ff9800; }
.field-card.red-border { border-left-color: #f44336; }

.result-section {
    display: none;
    margin-top: 30px;
    padding: 20px;
    background-color: #2a2a2a;
    border-radius: 8px;
    text-align: center;
}
.result-section h2 { margin-bottom: 15px; color: #fff; }
.score-board {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}
.score-item {
    padding: 15px 25px;
    border-radius: 8px;
    font-size: 1.2rem;
    font-weight: bold;
}
.score-green { background-color: rgba(76, 175, 80, 0.2); color: #4caf50; }
.score-yellow { background-color: rgba(255, 152, 0, 0.2); color: #ff9800; }
.score-red { background-color: rgba(244, 67, 54, 0.2); color: #f44336; }

.verdict {
    font-size: 1.2rem;
    font-weight: bold;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Painel de Avaliação (Moderador)</h1>
    
    <div class="import-section" id="dropZone">
        <p style="margin-bottom: 5px; color: #e0e0e0; font-size: 1.1rem;">Arraste e solte o arquivo <b>.whitelist</b> aqui</p>
        <p style="margin-bottom: 15px; color: #b3b3b3; font-size: 0.9rem;">ou clique no botão abaixo para procurar.</p>
        <label for="fileInput" class="file-label">Procurar Arquivo</label>
        
        <input type="file" id="fileInput">
        <p id="fileNameDisplay" style="margin-top: 15px; font-size: 0.95rem; color: #03dac6; font-weight: bold;"></p>
    </div>

    <div id="evaluationArea" style="display: none;">
        <div id="fieldsContainer"></div>

        <div class="result-section" id="resultSection">
            <h2>Resultado da Avaliação</h2>
            <div class="score-board">
                <div class="score-item score-green">Verdes: <span id="countGreen">0</span></div>
                <div class="score-item score-yellow">Amarelos: <span id="countYellow">0</span></div>
                <div class="score-item score-red">Vermelhos: <span id="countRed">0</span></div>
            </div>
            <div class="verdict" id="finalVerdict">Aguardando notas...</div>
        </div>
    </div>
</div>

<script>
let avaliacoes = {};
let totalCampos = 0;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', function(event) {
    if (event.target.files.length > 0) {
        processarArquivo(event.target.files[0]);
    }
    event.target.value = ''; 
});

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) {
        processarArquivo(e.dataTransfer.files[0]);
    }
});

function processarArquivo(file) {
    document.getElementById('fileNameDisplay').innerText = "✅ Arquivo carregado: " + file.name;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
  
            const textoLimpo = e.target.result.replace(/^\uFEFF/, '');
            const data = JSON.parse(textoLimpo);
            renderizarCampos(data);
        } catch (error) {
            console.error("Erro ao fazer parse:", error);
            alert("Erro ao ler o arquivo. O formato está inválido ou o arquivo foi corrompido.");
        }
    };
    reader.readAsText(file, "UTF-8");
}

function renderizarCampos(data) {
    const container = document.getElementById('fieldsContainer');
    container.innerHTML = '';
    avaliacoes = {};
    totalCampos = Object.keys(data).length;

    if (totalCampos === 0) {
        alert("O arquivo carregado está vazio!");
        return;
    }

    // Mostrar a área ANTES de criar os textareas (corrige o bug de altura zerada)
    document.getElementById('evaluationArea').style.display = 'block';
    document.getElementById('resultSection').style.display = 'block';

    let index = 0;
    for (const [key, value] of Object.entries(data)) {
        const fieldId = 'field_' + index;
        
        const card = document.createElement('div');
        card.className = 'field-card';
        card.id = 'card_' + fieldId;

        const title = document.createElement('div');
        title.className = 'field-title';
        title.innerText = key;

        const textarea = document.createElement('textarea');
        textarea.readOnly = true;
        textarea.value = value;
        
        const btnGroup = document.createElement('div');
        btnGroup.className = 'evaluation-buttons';

        const btnGreen = criarBotao('btn-green', 'Bom (Verde)', 'green', fieldId);
        const btnYellow = criarBotao('btn-yellow', 'Médio (Amarelo)', 'yellow', fieldId);
        const btnRed = criarBotao('btn-red', 'Ruim (Vermelho)', 'red', fieldId);

        btnGroup.appendChild(btnGreen);
        btnGroup.appendChild(btnYellow);
        btnGroup.appendChild(btnRed);

        card.appendChild(title);
        card.appendChild(textarea);
        card.appendChild(btnGroup);

        container.appendChild(card);
        index++;

        setTimeout(() => {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight + 5) + 'px';
        }, 50);
    }

    calcularResultado();
    
    window.scrollTo({ top: dropZone.offsetTop + dropZone.offsetHeight, behavior: 'smooth' });
}

function criarBotao(classe, texto, cor, fieldId) {
    const btn = document.createElement('button');
    btn.className = `btn-eval ${classe}`;
    btn.innerText = texto;
    btn.onclick = function() {
        registrarAvaliacao(fieldId, cor, btn);
    };
    return btn;
}

function registrarAvaliacao(fieldId, cor, btnElement) {
    avaliacoes[fieldId] = cor;

    const parent = btnElement.parentElement;
    const botoes = parent.querySelectorAll('.btn-eval');
    botoes.forEach(b => b.classList.remove('active'));

    btnElement.classList.add('active');

    const card = document.getElementById('card_' + fieldId);
    card.classList.remove('green-border', 'yellow-border', 'red-border');
    card.classList.add(cor + '-border');

    calcularResultado();
}

function calcularResultado() {
    let verdes = 0;
    let amarelos = 0;
    let vermelhos = 0;

    for (const key in avaliacoes) {
        if (avaliacoes[key] === 'green') verdes++;
        if (avaliacoes[key] === 'yellow') amarelos++;
        if (avaliacoes[key] === 'red') vermelhos++;
    }

    document.getElementById('countGreen').innerText = verdes;
    document.getElementById('countYellow').innerText = amarelos;
    document.getElementById('countRed').innerText = vermelhos;

    const verdictDiv = document.getElementById('finalVerdict');
    let totalAvaliados = verdes + amarelos + vermelhos;

    if (totalAvaliados < totalCampos) {
        verdictDiv.innerText = `Avaliando... (${totalAvaliados}/${totalCampos} campos avaliados)`;
        verdictDiv.style.backgroundColor = 'transparent';
        verdictDiv.style.color = '#b3b3b3';
        return;
    }

    let resultado = "";
    let corFundo = "";

    if (verdes > amarelos && verdes > vermelhos) {
        resultado = "APROVADO - A maioria das respostas foi Verde.";
        corFundo = "#4caf50";
    } 
    else if (vermelhos > verdes && vermelhos > amarelos) {
        resultado = "REPROVADO - A maioria das respostas foi Vermelha.";
        corFundo = "#f44336";
    } 
    else if (amarelos > verdes && amarelos > vermelhos) {
        if (verdes > vermelhos) {
            resultado = "EM ANÁLISE (Tendência Positiva) - Maioria Amarela, com mais Verdes que Vermelhos.";
            corFundo = "#8bc34a";
        } else if (vermelhos > verdes) {
            resultado = "EM ANÁLISE (Tendência Negativa) - Maioria Amarela, com mais Vermelhos que Verdes.";
            corFundo = "#ff5722";
        } else {
            resultado = "EM ANÁLISE (Neutro) - Maioria Amarela, empate entre Verdes e Vermelhos.";
            corFundo = "#ff9800";
        }
    } 
    else {
        resultado = "RESULTADO EMPATADO - Avaliação manual necessária pelo Staff.";
        corFundo = "#757575";
    }

    verdictDiv.innerText = resultado;
    verdictDiv.style.backgroundColor = corFundo;
    verdictDiv.style.color = (corFundo === '#ff9800' || corFundo === '#8bc34a') ? '#121212' : '#ffffff';
}
    //GameSistem Oficial Cód.
</script>

</body>
</html>
